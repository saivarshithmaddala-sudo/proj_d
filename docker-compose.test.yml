version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: zamazon-identity-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zamazon_identity_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_test_data:
